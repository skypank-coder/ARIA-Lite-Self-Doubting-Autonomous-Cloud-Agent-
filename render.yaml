services:
  - type: web
    name: aria-lite-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PORT
        value: 8000
