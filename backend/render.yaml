services:
  - type: web
    name: aria-lite-backend
    runtime: python
    rootDir: backend

    buildCommand: |
      python --version
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
